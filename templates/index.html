<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAnalysis - Plant Counting</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
       .upload-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.2);
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            border-top: 6px solid #4caf50;
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 32px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        input[type="file"] {
            display: none;
        }
       .file-label {
            display: block;
            padding: 15px;
            background: #f1f8e9;
            border: 2px dashed #81c784;
            border-radius: 10px;
            cursor: pointer;
            color: #388e3c;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
       .file-label:hover {
            background: #e8f5e9;
            border-color: #4caf50;
        }
       .btn {
            padding: 14px 40px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
       .btn:hover {
            background: #388e3c;
        }
        #file-name {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="upload-card">
        <h1>AgriAnalysis Web App -Plant Counting System</h1>
        <p>Upload an aerial image to count plants automatically</p>

        <form method="POST" action="/upload" enctype="multipart/form-data">
            <label for="image" class="file-label">📁 Choose Image</label>
            <input type="file" id="image" name="image" accept="image/*" required>
            <div id="file-name">No file selected</div>
            <button type="submit" class="btn">Upload & Analyze</button>
        </form>
    </div>

    <script>
        document.getElementById('image').onchange = function() {
            document.getElementById('file-name').textContent =
                this.files[0]? this.files[0].name : 'No file selected';
        };
    </script>
</body>
</html>
